services:

  # --- Databases ---

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "8002:8000"   # host:container — ChromaDB luistert intern op 8000, wij mappen naar 8002
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  # --- LLM (Ollama) ---

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # model-gewichten blijven bewaard na restart
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]   # NVIDIA RTX 4050 via WSL2

  # --- Backend (FastAPI) ---

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Hot reload: lokale ./backend map wordt gespiegeld in de container.
      # Uvicorn detecteert bestandswijzigingen en herstart automatisch.
      # Verwijder deze volume-regel voor een productie-build.
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-haiku-4-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://host.docker.internal:3000}
      MCP_URL: http://mcp-server:8001
      ESCALATION_MODEL: ${ESCALATION_MODEL:-qwen2.5:0.5b}
      ESCALATION_COOLDOWN_MINUTES: ${ESCALATION_COOLDOWN_MINUTES:-5}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  # --- MCP Server (fastmcp) ---

  mcp-server:
    build: ./mcp-server
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      # Hot reload via volume mount (zelfde principe als backend)
      - ./mcp-server:/app
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MCP_PORT: 8001
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3:latest}
      BACKEND_URL: http://backend:8000
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_started

  # --- Ollama model init (eenmalig bij opstart) ---

  ollama-init:
    image: ollama/ollama
    depends_on:
      - ollama
    entrypoint: ["ollama", "pull", "bge-m3"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

volumes:
  postgres_data:    # persistente PostgreSQL data — blijft na container-restart
  chroma_data:      # persistente ChromaDB vectoren — blijft na container-restart
  ollama_data:      # Ollama model-gewichten — voorkomt herdownload bij restart
